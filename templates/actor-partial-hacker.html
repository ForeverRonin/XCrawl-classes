<section class="tab hacker {{tabs.hacker.cssClass}}" data-tab="{{tabs.hacker.id}}" data-group="{{tabs.hacker.group}}">
    {{!-- Hidden inputs to reflect the sheet class --}}
    <input type="hidden" id="system.details.sheetClass" name="system.details.sheetClass" value="Hacker" data-dtype="String"/>
    <input type="hidden" id="system.details.critRange" name="system.details.critRange" value="20" data-dtype="Number"/>
    
    <div class="grid-container">
        <div class="grid-col-span-12 dark-border">
            <div class="box-title">{{localize "Hacker.HackerAbilities"}}</div>
            <div class="grid-tpl-two grid-row-gap-8 p-5">
                <!-- Mojo Resource -->
                <div class="grid-tpl-max-auto grid-col-span-2" style="align-items: center;">
                    <label for="system.resources.mojo.value">
                        {{localize "XCC.Mojo"}}
                    </label>
                    <div class="grid-tpl-min-auto grid-col-gap-5">
                        <input type="number" id="system.resources.mojo.value" name="system.resources.mojo.value"
                               value="{{system.resources.mojo.value}}" data-dtype="Number" min="0"/>
                        <span>/</span>
                        <input type="number" id="system.resources.mojo.max" name="system.resources.mojo.max"
                               value="{{system.resources.mojo.max}}" data-dtype="Number" min="0"/>
                    </div>
                </div>

                <!-- Fame -->
                <div class="grid-tpl-max-auto grid-col-span-2" style="align-items: center;">
                    <label for="system.class.fame.value">
                        {{localize "XCC.Fame"}}
                    </label>
                    <div class="grid-tpl-min-auto grid-col-gap-5">
                        <input type="number" id="system.class.fame.value" name="system.class.fame.value"
                               value="{{system.class.fame.value}}" data-dtype="Number" min="0"/>
                        <span>/</span>
                        <input type="number" id="system.class.fame.max" name="system.class.fame.max"
                               value="{{system.class.fame.max}}" data-dtype="Number" min="0"/>
                    </div>
                </div>

                <!-- Hacking Check -->
                <div class="grid-tpl-max-25" data-skill="hackingCheck">
                    <label class="skill-check rollable" for="system.skills.hackingCheck.value"
                           data-action="rollSkillCheck" data-drag="true" data-drag-action="skill">
                        {{localize "Hacker.HackingCheck"}}
                    </label>
                    <input type="text" id="system.skills.hackingCheck.value"
                           name="system.skills.hackingCheck.value" value="{{system.skills.hackingCheck.value}}"
                           data-dtype="String"/>
                </div>

                <!-- System Knowledge -->
                <div class="grid-tpl-max-25" data-skill="systemKnowledge">
                    <label class="skill-check rollable" for="system.skills.systemKnowledge.value"
                           data-action="rollSkillCheck" data-drag="true" data-drag-action="skill">
                        {{localize "Hacker.SystemKnowledge"}}
                    </label>
                    <input type="text" id="system.skills.systemKnowledge.value"
                           name="system.skills.systemKnowledge.value" value="{{system.skills.systemKnowledge.value}}"
                           data-dtype="String"/>
                </div>

                <!-- Program Check -->
                <input type="hidden" id="system.class.spellCheckAbility" name="system.class.spellCheckAbility" value="">
                <div class="grid-tpl-max-25" data-ability="">
                    <label class="spell-check rollable" for="system.class.spellCheck"
                           data-action="rollSpellCheck" data-drag="true" data-drag-action="spell">
                        {{localize "XCC.ProgramCheck"}}
                    </label>
                    <input type="text" id="system.class.spellCheck" name="system.class.spellCheck"
                           value="{{numberFormat system.class.spellCheck decimals=0 sign=true}}"
                           data-dtype="String"/>
                </div>

                <ul class="class-note flexcol">
                    <li>
                        {{localize "XCC.MojoDesc"}}
                    </li>
                    <li>
                        {{localize "XCC.FameDesc"}}
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>
