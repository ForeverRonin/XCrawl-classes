<section class="tab spells {{tabs.spells.cssClass}}" data-tab="{{tabs.spells.id}}" data-group="{{tabs.spells.group}}">
    <div class="grid-container">
        <div class="grid-col-span-12">
            <div class="box-title">{{localize "XCC.Programs"}}</div>
        </div>
        <div class="grid-col-span-12 p-5">
            <ol class="items-list">
                <li class="item flexrow items-header">
                    <div class="item-name">{{localize "DCC.ItemName"}}</div>
                    <div class="item-controls">
                        <a class="item-control item-create" title="{{localize 'DCC.CreateItem'}}" data-type="spell"><i class="fas fa-plus"></i> {{localize "DCC.Add"}}</a>
                    </div>
                </li>
                {{#each items.spell as |item id|}}
                    <li class="item flexrow" data-item-id="{{item._id}}">
                        <div class="item-name">
                            <div class="item-image"><img src="{{item.img}}" title="{{item.name}}" width="24" height="24"/></div>
                            <h4>{{item.name}}</h4>
                        </div>
                        <div class="item-controls">
                            <a class="item-control item-edit" title="{{localize 'DCC.EditItem'}}"><i class="fas fa-edit"></i></a>
                            <a class="item-control item-delete" title="{{localize 'DCC.DeleteItem'}}"><i class="fas fa-trash"></i></a>
                        </div>
                    </li>
                {{/each}}
            </ol>
            <p class="notes">{{localize "XCC.ProgramsTabHelp"}}</p>
        </div>
    </div>
</section>
